<svg viewBox="0 0 940 1160" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="940" height="1160" fill="#ffffff"/>

  <!-- Titre -->
  <text x="30" y="34" font-size="18" font-weight="700" fill="#0f172a">Oliveira-Saraiva &amp; Ferreira (2023) — Autoencodeur normatif sur rs-fMRI</text>
  <text x="30" y="54" font-size="12.5" fill="#64748b">Connectivité fonctionnelle anormale dans la schizophrénie, le trouble bipolaire et le TDAH</text>

  <!-- Légende -->
  <rect x="690" y="20" width="220" height="56" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="704" y="34" width="16" height="12" rx="2" fill="#ccfbf1" stroke="#0d9488"/>
  <text x="728" y="44" font-size="11.5" fill="#134e4a">teal = niveau du score</text>
  <rect x="704" y="54" width="16" height="12" rx="2" fill="#ffe1da" stroke="#fb6f5d"/>
  <text x="728" y="64" font-size="11.5" fill="#7f1d1d">corail = finalité du score</text>

  <!-- Arrows (tronc) -->
  <g stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <path d="M440,154 C400,168 320,172 280,184"/>
    <path d="M500,154 C540,168 620,172 660,184"/>
    <path d="M280,277 C320,300 410,312 445,329"/>
    <path d="M660,277 C620,300 530,312 495,329"/>
    <path d="M470,422 L470,474"/>
    <path d="M445,575 C400,598 320,608 280,639"/>
    <path d="M495,575 C540,598 620,608 660,639"/>
    <path d="M270,718 L270,759"/>
    <path d="M270,820 L270,849"/>
    <path d="M670,718 L670,759"/>
    <path d="M670,820 L670,849"/>
    <path d="M270,910 C300,945 370,958 410,983"/>
    <path d="M670,910 C640,945 570,958 530,983"/>
  </g>

  <!-- 1. Données d'entrée (bleu) -->
  <rect x="320" y="90" width="300" height="64" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="334" y="112" font-size="13.5" font-weight="700" fill="#1e3a8a">Données d'entrée</text>
  <text x="334" y="131" font-size="11.5" fill="#1e40af">rs-fMRI au repos, 655 sujets (après contrôle qualité)</text>
  <text x="334" y="147" font-size="11.5" fill="#1e40af">3 bases publiques : CoRR, UCLA LA5c, COBRE</text>

  <!-- 2a. Features (y) -->
  <rect x="120" y="185" width="300" height="92" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="134" y="207" font-size="13" font-weight="700" fill="#1e3a8a">Features (y)</text>
  <text x="134" y="226" font-size="11.5" fill="#1e40af">Connectivité fonctionnelle : corrélations</text>
  <text x="134" y="242" font-size="11.5" fill="#1e40af">de Pearson entre 14 réseaux fonctionnels</text>
  <text x="134" y="258" font-size="11.5" fill="#1e40af">Niveau : paires de réseaux</text>
  <text x="134" y="274" font-size="11.5" fill="#1e40af">91 features/sujet (demi-matrice 14×14)</text>

  <!-- 2b. Covariables (x) -->
  <rect x="520" y="185" width="300" height="92" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="534" y="207" font-size="13" font-weight="700" fill="#1e3a8a">Covariables (x)</text>
  <text x="534" y="226" font-size="11.5" fill="#1e40af">Aucune : ni âge ni sexe en entrée</text>
  <text x="534" y="242" font-size="11.5" fill="#1e40af">Standardisation z-score (réf. H-Train)</text>
  <text x="534" y="258" font-size="11.5" fill="#1e40af">Effets non-linéaires : non applicable</text>

  <!-- 3. Modélisation normative (violet) -->
  <rect x="295" y="330" width="350" height="92" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="309" y="352" font-size="13.5" font-weight="700" fill="#5b21b6">Modélisation normative</text>
  <text x="309" y="371" font-size="11.5" fill="#5b21b6">Autoencodeur (91-46-13-46-91, leaky ReLU)</text>
  <text x="309" y="387" font-size="11.5" fill="#5b21b6">Dropout 0,5 · L2 1e-5 · Adam · 1000 epochs</text>
  <text x="309" y="403" font-size="11.5" fill="#5b21b6">Granularité : modèle global (91 features)</text>
  <text x="309" y="419" font-size="11.5" fill="#5b21b6">Entraînement : 366 sujets sains · 10-fold CV</text>

  <!-- 4. Scores déviants (ambre) -->
  <rect x="295" y="475" width="350" height="100" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.6"/>
  <text x="309" y="497" font-size="13.5" font-weight="700" fill="#92400e">Scores déviants</text>
  <text x="309" y="516" font-size="11.5" fill="#92400e">MSEs : erreur de reconstruction par sujet</text>
  <text x="309" y="532" font-size="11.5" fill="#92400e">MSEf : erreur par paire de réseaux</text>
  <text x="309" y="548" font-size="11.5" fill="#92400e">Direction : valeur absolue |sortie − entrée|</text>
  <text x="309" y="564" font-size="11.5" fill="#92400e">Seuil : 20% plus hautes valeurs (degré, graphes)</text>

  <!-- 5a. Teal — Global par sujet -->
  <rect x="120" y="640" width="300" height="78" rx="10" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.6"/>
  <text x="134" y="662" font-size="13" font-weight="700" fill="#134e4a">Global par sujet</text>
  <text x="134" y="681" font-size="11.5" fill="#115e59">MSEs agrégée sur les 91 features</text>
  <text x="134" y="697" font-size="11.5" fill="#115e59">Médiane comparée entre groupes</text>
  <text x="134" y="713" font-size="11.5" fill="#115e59">(boxplots par groupe)</text>

  <!-- 5b. Teal — Par réseau -->
  <rect x="520" y="640" width="300" height="78" rx="10" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.6"/>
  <text x="534" y="662" font-size="13" font-weight="700" fill="#134e4a">Par réseau</text>
  <text x="534" y="681" font-size="11.5" fill="#115e59">MSEf par paire de réseaux</text>
  <text x="534" y="697" font-size="11.5" fill="#115e59">+ degré (théorie des graphes)</text>
  <text x="534" y="713" font-size="11.5" fill="#115e59">Médiane du degré par FBN</text>

  <!-- 6a. Corail — Détection d'atypies -->
  <rect x="120" y="760" width="300" height="60" rx="10" fill="#ffe1da" stroke="#fb6f5d" stroke-width="1.4"/>
  <text x="134" y="782" font-size="12.5" font-weight="700" fill="#7f1d1d">Détection d'atypies</text>
  <text x="134" y="801" font-size="11.5" fill="#991b1b">Patients dévient plus que les sains</text>
  <text x="134" y="815" font-size="11.5" fill="#991b1b">(hétérogénéité forte intra-groupe)</text>

  <!-- 6b. Corail — Comparaison de groupes (global) -->
  <rect x="120" y="850" width="300" height="60" rx="10" fill="#ffe1da" stroke="#fb6f5d" stroke-width="1.4"/>
  <text x="134" y="872" font-size="12.5" font-weight="700" fill="#7f1d1d">Comparaison de groupes</text>
  <text x="134" y="891" font-size="11.5" fill="#991b1b">Mann-Whitney : patients vs sains</text>
  <text x="134" y="905" font-size="11.5" fill="#991b1b">p &lt; 0,05 (UCLA) ; non sign. (COBRE)</text>

  <!-- 6c. Corail — Localisation -->
  <rect x="520" y="760" width="300" height="60" rx="10" fill="#ffe1da" stroke="#fb6f5d" stroke-width="1.4"/>
  <text x="534" y="782" font-size="12.5" font-weight="700" fill="#7f1d1d">Localisation</text>
  <text x="534" y="801" font-size="11.5" fill="#991b1b">Paires de réseaux anormales</text>
  <text x="534" y="815" font-size="11.5" fill="#991b1b">propres à chaque trouble</text>

  <!-- 6d. Corail — Comparaison de groupes (réseau) -->
  <rect x="520" y="850" width="300" height="60" rx="10" fill="#ffe1da" stroke="#fb6f5d" stroke-width="1.4"/>
  <text x="534" y="872" font-size="12.5" font-weight="700" fill="#7f1d1d">Comparaison de groupes</text>
  <text x="534" y="891" font-size="11.5" fill="#991b1b">Soustraction matrice MSEf des sains</text>
  <text x="534" y="905" font-size="11.5" fill="#991b1b">→ patterns spécifiques au groupe</text>

  <!-- 7. Application clinique (pointillés) -->
  <rect x="220" y="985" width="500" height="115" rx="12" fill="#f8fafc" stroke="#475569" stroke-width="1.8" stroke-dasharray="7 5"/>
  <text x="240" y="1010" font-size="13.5" font-weight="700" fill="#0f172a">Application clinique</text>
  <text x="240" y="1030" font-size="11.5" fill="#334155">Patterns de connectivité distincts par trouble (ex. réseau des</text>
  <text x="240" y="1046" font-size="11.5" fill="#334155">ganglions de la base en BD/SCZ ; salience–précunéus en TDAH)</text>
  <text x="240" y="1064" font-size="11.5" fill="#334155">Concordance avec la littérature, modèle généralisable (COBRE)</text>
  <text x="240" y="1082" font-size="11.5" fill="#334155">Différences de groupe ne résistent pas au niveau individuel →</text>
  <text x="240" y="1098" font-size="11.5" fill="#334155">plaide pour une médecine de précision (non-association phénotype)</text>
</svg>
