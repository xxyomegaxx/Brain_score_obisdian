el</text><line x1="550" y1="328" x2="700" y2="358" stroke="#64748b" marker-end="url(#arrow)"/><rect x="550" y="424" width="300" height="50" rx="8" fill="#ffe4e0" stroke="#e26d5a"/><text x="700" y="443" text-anchor="middle" class="t">Prédiction</text><text x="565" y="462" class="d">Classif. dépression vs HC, AUC 0,71–0,78</text><line x1="700" y1="400" x2="700" y2="424" stroke="#64748b" marker-end="url(#arrow)"/><rect x="550" y="498" width="300" height="50" rx="8" fill="#ffe4e0" stroke="#e26d5a"/><text x="700" y="517" text-anchor="middle" class="t">Stratification</text><text x="565" y="536" class="d">Sous-types de réponse antidépresseur</text><line x1="700" y1="474" x2="700" y2="498" stroke="#64748b" marker-end="url(#arrow)"/><rect x="290" y="572" width="400" height="58" rx="8" fill="#ffffff" stroke="#475569" stroke-dasharray="6 4"/><text x="490" y="592" text-anchor="middle" class="t">Application clinique</text><text x="305" y="610" class="d">Dépression — diagnostic individualisé</text><text x="305" y="626" class="d">Orientation du traitement (SSRI/SNRI)</text><line x1="280" y1="548" x2="430" y2="572" stroke="#64748b" marker-end="url(#arrow)"/><line x1="700" y1="548" x2="550" y2="572" stroke="#64748b" marker-end="url(#arrow)"/></svg>