<svg viewBox="0 0 980 880" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <style>
      .t{font-size:12.5px;font-weight:700;fill:#0f172a}
      .d{font-size:10.5px;fill:#334155}
      .lbl{font-size:10px;fill:#475569;font-style:italic}
    </style>
  </defs>
  <rect x="0" y="0" width="980" height="880" fill="#ffffff"/>

  <g transform="translate(690,16)">
    <rect width="14" height="14" rx="3" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="20" y="11" class="lbl">teal = niveau du score</text>
    <rect y="22" width="14" height="14" rx="3" fill="#ffe4e0" stroke="#e26d5a"/>
    <text x="20" y="33" class="lbl">corail = finalité</text>
  </g>

  <!-- 1. Donnees d'entree -->
  <rect x="330" y="20" width="320" height="34" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="490" y="42" text-anchor="middle" class="t">Données d'entrée</text>

  <rect x="60" y="74" width="390" height="92" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="255" y="93" text-anchor="middle" class="t">Features (y)</text>
  <text x="75" y="113" class="d">Volumes substance grise/blanche (VBM, T1w)</text>
  <text x="75" y="129" class="d">+ épaisseur corticale, aire piale (FreeSurfer)</text>
  <text x="75" y="145" class="d">Niveau voxel / région</text>
  <text x="75" y="161" class="d">Étude TOP (Oslo)</text>

  <rect x="530" y="74" width="390" height="92" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="725" y="93" text-anchor="middle" class="t">Covariables (x)</text>
  <text x="545" y="113" class="d">Âge et sexe</text>
  <text x="545" y="129" class="d">Niveau sujet</text>
  <text x="545" y="145" class="d">Non-linéarités : noyau du processus gaussien</text>

  <line x1="490" y1="54" x2="255" y2="74" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="490" y1="54" x2="725" y2="74" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="255" y1="166" x2="485" y2="190" stroke="#64748b"/>
  <line x1="725" y1="166" x2="495" y2="190" stroke="#64748b"/>

  <!-- 2. Modelisation normative -->
  <rect x="280" y="192" width="420" height="98" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="490" y="212" text-anchor="middle" class="t">Modélisation normative</text>
  <text x="295" y="232" class="d">GPR : volume = f(âge, sexe), par voxel/région</text>
  <text x="295" y="248" class="d">Confiance prédictive (incertitude) intégrée</text>
  <text x="295" y="264" class="d">Entraîné sur 256 sujets sains, CV 10-fold</text>
  <text x="295" y="280" class="d">Puis appliqué à 218 SZ + 190 bipolaires</text>
  <line x1="490" y1="190" x2="490" y2="192" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- 3. Scores deviants -->
  <rect x="300" y="322" width="380" height="84" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="490" y="342" text-anchor="middle" class="t">Scores déviants</text>
  <text x="315" y="362" class="d">z = (obs − prédit) / incertitude ; signé</text>
  <text x="315" y="378" class="d">Déviation extrême : |z| &gt; 2,6 (P &lt; 0,005)</text>
  <text x="315" y="394" class="d">Seuil fixe identique pour chaque sujet</text>
  <line x1="490" y1="290" x2="490" y2="322" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- racine teal -->
  <rect x="340" y="436" width="300" height="58" rx="8" fill="#ccfbf1" stroke="#0d9488"/>
  <text x="490" y="456" text-anchor="middle" class="t">Par région</text>
  <text x="355" y="476" class="d">Z-scores voxel par voxel</text>
  <text x="355" y="490" class="d">Cartes individuelles + cartes de chevauchement</text>
  <line x1="490" y1="406" x2="490" y2="436" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- feuilles corail (2 colonnes) -->
  <rect x="80" y="540" width="380" height="50" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
  <text x="270" y="560" text-anchor="middle" class="t">Localisation</text>
  <text x="95" y="579" class="d">Loci frontaux, temporaux, cérébelleux atteints</text>

  <rect x="520" y="540" width="380" height="50" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
  <text x="710" y="560" text-anchor="middle" class="t">Comparaison de groupes</text>
  <text x="535" y="579" class="d">SZ 0,9 % vs HC 0,23 % vs BD 0,24 % (voxels extrêmes −)</text>

  <rect x="80" y="610" width="380" height="50" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
  <text x="270" y="630" text-anchor="middle" class="t">Détection d'atypies</text>
  <text x="95" y="649" class="d">Chevauchement &gt;2 % des patients en de rares loci</text>

  <rect x="520" y="610" width="380" height="50" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
  <text x="710" y="630" text-anchor="middle" class="t">Association au phénotype</text>
  <text x="535" y="649" class="d">% extrêmes lié au diagnostic, cognition, clinique</text>

  <line x1="430" y1="494" x2="270" y2="540" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="550" y1="494" x2="710" y2="540" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="270" y1="590" x2="270" y2="610" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="710" y1="590" x2="710" y2="610" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- application clinique (pointilles) -->
  <rect x="300" y="710" width="380" height="86" rx="8" fill="#ffffff" stroke="#475569" stroke-dasharray="6 4"/>
  <text x="490" y="732" text-anchor="middle" class="t">Application clinique</text>
  <text x="315" y="752" class="d">Schizophrénie : déficits frontaux/temporaux/cérébelleux</text>
  <text x="315" y="768" class="d">Trouble bipolaire : déficits surtout cérébelleux</text>
  <text x="315" y="784" class="d">Profils individuels → stratification, médecine de précision</text>

  <line x1="270" y1="660" x2="430" y2="710" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="710" y1="660" x2="550" y2="710" stroke="#64748b" marker-end="url(#arrow)"/>
</svg>
