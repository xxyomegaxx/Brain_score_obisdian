<svg viewBox="0 0 980 980" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <style>
      .t{font-size:12.5px;font-weight:700;fill:#0f172a}
      .d{font-size:10.5px;fill:#334155}
      .lbl{font-size:10px;fill:#475569;font-style:italic}
    </style>
  </defs>
  <rect x="0" y="0" width="980" height="980" fill="#ffffff"/>

  <g transform="translate(690,16)">
    <rect width="14" height="14" rx="3" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="20" y="11" class="lbl">teal = niveau du score</text>
    <rect y="22" width="14" height="14" rx="3" fill="#ffe4e0" stroke="#e26d5a"/>
    <text x="20" y="33" class="lbl">corail = finalité</text>
  </g>

  <!-- 1. Donnees d'entree -->
  <rect x="330" y="20" width="320" height="34" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="490" y="42" text-anchor="middle" class="t">Données d'entrée</text>

  <rect x="60" y="74" width="390" height="96" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="255" y="93" text-anchor="middle" class="t">Features (y)</text>
  <text x="75" y="113" class="d">30 volumes de WMH par sujet</text>
  <text x="75" y="129" class="d">Cerveau entier, périventr., profond ; 11 lobes ; 16 territoires</text>
  <text x="75" y="145" class="d">Pipeline UBO ; niveau région</text>
  <text x="75" y="161" class="d">Log-transformés + standardisés (z)</text>

  <rect x="530" y="74" width="390" height="96" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="725" y="93" text-anchor="middle" class="t">Covariables (x)</text>
  <text x="545" y="113" class="d">Âge, sexe, volume intracrânien total</text>
  <text x="545" y="129" class="d">4 risques vasculaires : diabète, cholestérol, obésité, tabac</text>
  <text x="545" y="145" class="d">7 covariables → vecteur 12-dim ; niveau sujet</text>
  <text x="545" y="161" class="d">Non-linéarités : couche cachée 128 ReLU</text>

  <line x1="490" y1="54" x2="255" y2="74" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="490" y1="54" x2="725" y2="74" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="255" y1="170" x2="485" y2="192" stroke="#64748b"/>
  <line x1="725" y1="170" x2="495" y2="192" stroke="#64748b"/>

  <!-- 2. Modelisation normative -->
  <rect x="280" y="194" width="420" height="100" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="490" y="214" text-anchor="middle" class="t">Modélisation normative</text>
  <text x="295" y="234" class="d">cVAE : encodeur/décodeur, latent 16-dim</text>
  <text x="295" y="250" class="d">Perte = divergence KL + log-vraisemblance ; Optuna</text>
  <text x="295" y="266" class="d">Entraîné sur 5 985 normotendus (sains)</text>
  <text x="295" y="282" class="d">Comparé à GAMLSS, MFPR, HBR (CV 5-fold)</text>
  <line x1="490" y1="192" x2="490" y2="194" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- 3. Scores deviants -->
  <rect x="300" y="326" width="380" height="86" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="490" y="346" text-anchor="middle" class="t">Scores déviants</text>
  <text x="315" y="366" class="d">z = (Y − μ̂)/σ̂ ; signé</text>
  <text x="315" y="382" class="d">μ̂, σ̂ : prior-sampling (1000) + bootstrap (1000)</text>
  <text x="315" y="398" class="d">Déviation extrême : |z| &gt; 2.58 (IC 99 %)</text>
  <line x1="490" y1="294" x2="490" y2="326" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- arborescence : 2 racines teal -->
  <rect x="120" y="452" width="320" height="58" rx="8" fill="#ccfbf1" stroke="#0d9488"/>
  <text x="280" y="472" text-anchor="middle" class="t">Par région</text>
  <text x="135" y="492" class="d">Z-scores des 30 régions de WMH</text>
  <text x="135" y="506" class="d">Cartes par territoire artériel / lobe</text>

  <rect x="540" y="452" width="320" height="58" rx="8" fill="#ccfbf1" stroke="#0d9488"/>
  <text x="700" y="472" text-anchor="middle" class="t">Global par sujet</text>
  <text x="555" y="492" class="d">WMH cerveau entier comme score résumé</text>
  <text x="555" y="506" class="d">Lien aux mesures cliniques du sujet</text>

  <line x1="430" y1="412" x2="280" y2="452" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="550" y1="412" x2="700" y2="452" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- feuilles corail gauche -->
  <rect x="120" y="540" width="320" height="48" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
  <text x="280" y="560" text-anchor="middle" class="t">Localisation</text>
  <text x="135" y="578" class="d">Cartes cérébrales des déviations par région</text>

  <rect x="120" y="608" width="320" height="48" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
  <text x="280" y="628" text-anchor="middle" class="t">Détection d'atypies</text>
  <text x="135" y="646" class="d">% de |z|&gt;2.58 ; cVAE conservateur vs MFPR</text>

  <line x1="280" y1="510" x2="280" y2="540" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="280" y1="588" x2="280" y2="608" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- feuilles corail droite -->
  <rect x="540" y="540" width="320" height="48" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
  <text x="700" y="560" text-anchor="middle" class="t">Association au phénotype</text>
  <text x="555" y="578" class="d">z ↔ niveaux d'hypertension (Spearman r≈0,08)</text>

  <rect x="540" y="608" width="320" height="48" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
  <text x="700" y="628" text-anchor="middle" class="t">Comparaison de groupes</text>
  <text x="555" y="646" class="d">% extrêmes selon sévérité d'hypertension (0–3)</text>

  <line x1="700" y1="510" x2="700" y2="540" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="700" y1="588" x2="700" y2="608" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- application clinique (pointilles) -->
  <rect x="300" y="800" width="380" height="86" rx="8" fill="#ffffff" stroke="#475569" stroke-dasharray="6 4"/>
  <text x="490" y="822" text-anchor="middle" class="t">Application clinique</text>
  <text x="315" y="842" class="d">Maladie des petits vaisseaux cérébraux (WMH)</text>
  <text x="315" y="858" class="d">Déviations ↑ avec la sévérité de l'hypertension</text>
  <text x="315" y="874" class="d">Meilleur compromis sensibilité/spécificité (vs MFPR)</text>

  <line x1="280" y1="656" x2="430" y2="800" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="700" y1="656" x2="550" y2="800" stroke="#64748b" marker-end="url(#arrow)"/>
</svg>
