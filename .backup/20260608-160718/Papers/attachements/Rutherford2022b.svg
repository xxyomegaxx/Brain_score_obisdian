<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 962" width="900" height="962" font-family="Segoe UI,Arial,sans-serif"><defs><marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker></defs><rect x="0" y="0" width="900" height="962" fill="#ffffff"/><text x="20" y="32" font-family="Segoe UI,Arial" font-size="14" font-weight="700" fill="#0f172a">Rutherford et al. 2022 — Cadre de modélisation normative pour la psychiatrie computationnelle (protocole)</text><g><rect x="662" y="20" width="220" height="56" rx="8" fill="#ffffff" stroke="#cbd5e1"/><rect x="672" y="32" width="14" height="14" rx="3" fill="#ccfbf1" stroke="#0d9488"/><text x="692" y="43" font-family="Segoe UI,Arial" font-size="11" fill="#1e293b">teal = niveau du score</text><rect x="672" y="52" width="14" height="14" rx="3" fill="#ffe4e0" stroke="#fb7185"/><text x="692" y="63" font-family="Segoe UI,Arial" font-size="11" fill="#1e293b">corail = finalité du score</text></g><rect x="190.0" y="28" width="520" height="116" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
<text x="202.0" y="47" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#2563eb">Données d&#x27;entrée</text>
<text x="202.0" y="65" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Features (y) : épaisseur corticale + volumes sous-corticaux</text>
<text x="202.0" y="81" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">(sMRI/FreeSurfer) dans la démo.</text>
<text x="202.0" y="97" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Covariables (x) : âge, sexe, site (et option : indice de qualité, ex.</text>
<text x="202.0" y="113" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">nombre d&#x27;Euler).</text>
<text x="202.0" y="129" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Cohorte de référence multisite (sujets neurotypiques) ; split 70/30 ou</text>
<rect x="190.0" y="174" width="520" height="116" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
<text x="202.0" y="193" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#7c3aed">Modélisation normative</text>
<text x="202.0" y="211" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Boîte à outils PCNtoolkit ; algorithmes : BLR, Warped BLR, HBR, GPR.</text>
<text x="202.0" y="227" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">HBR pour données multisites : scores Z agnostiques au site (effets de site</text>
<text x="202.0" y="243" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">hiérarchiques).</text>
<text x="202.0" y="259" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Granularité : ROI ou vertex/voxel.</text>
<text x="202.0" y="275" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Validation : généralisation hors-échantillon (train/test).</text>
<rect x="190.0" y="320" width="520" height="116" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
<text x="202.0" y="339" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#d97706">Scores déviants</text>
<text x="202.0" y="357" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Sorties : brain score prédit, variance prédictive, score de déviation Z par</text>
<text x="202.0" y="373" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">sujet.</text>
<text x="202.0" y="389" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Cartes de déviation (par région).</text>
<text x="202.0" y="405" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Direction : déviations positives/négatives ; statistiques des valeurs</text>
<text x="202.0" y="421" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">extrêmes.</text>
<line x1="450.0" y1="144" x2="450.0" y2="174" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
<line x1="450.0" y1="290" x2="450.0" y2="320" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
<line x1="450.0" y1="436" x2="235.0" y2="470" stroke="#0d9488" stroke-width="2" marker-end="url(#ah)"/>
<rect x="55.0" y="470" width="360" height="68" rx="10" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
<text x="67.0" y="489" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#0d9488">Par région</text>
<text x="67.0" y="507" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Cartes de déviation Z par ROI/vertex.</text>
<text x="67.0" y="523" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Tests univariés sur les cartes de déviation.</text>
<line x1="235.0" y1="538" x2="235.0" y2="562" stroke="#fb7185" stroke-width="2" marker-end="url(#ah)"/>
<rect x="55.0" y="562" width="360" height="52" rx="10" fill="#ffe4e0" stroke="#fb7185" stroke-width="2"/>
<text x="67.0" y="581" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#fb7185">Localisation</text>
<text x="67.0" y="599" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Identifier les régions déviantes pour un individu.</text>
<line x1="235.0" y1="614" x2="235.0" y2="638" stroke="#fb7185" stroke-width="2" marker-end="url(#ah)"/>
<rect x="55.0" y="638" width="360" height="68" rx="10" fill="#ffe4e0" stroke="#fb7185" stroke-width="2"/>
<text x="67.0" y="657" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#fb7185">Comparaison de groupes</text>
<text x="67.0" y="675" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">t-tests cas-témoins sur les cartes de déviation</text>
<text x="67.0" y="691" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">(comparé au paradigme classique).</text>
<line x1="450.0" y1="436" x2="665.0" y2="470" stroke="#0d9488" stroke-width="2" marker-end="url(#ah)"/>
<rect x="485.0" y="470" width="360" height="100" rx="10" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
<text x="497.0" y="489" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#0d9488">Global par sujet</text>
<text x="497.0" y="507" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Résumé des cartes : compte de déviations extrêmes</text>
<text x="497.0" y="523" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">par sujet.</text>
<text x="497.0" y="539" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Compte par groupe (n&#x27;exige pas de recouvrement</text>
<text x="497.0" y="555" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">spatial).</text>
<line x1="665.0" y1="570" x2="665.0" y2="594" stroke="#fb7185" stroke-width="2" marker-end="url(#ah)"/>
<rect x="485.0" y="594" width="360" height="68" rx="10" fill="#ffe4e0" stroke="#fb7185" stroke-width="2"/>
<text x="497.0" y="613" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#fb7185">Détection d&#x27;atypies</text>
<text x="497.0" y="631" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Statistiques des valeurs extrêmes : individus à</text>
<text x="497.0" y="647" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">forte déviation.</text>
<line x1="665.0" y1="662" x2="665.0" y2="686" stroke="#fb7185" stroke-width="2" marker-end="url(#ah)"/>
<rect x="485.0" y="686" width="360" height="68" rx="10" fill="#ffe4e0" stroke="#fb7185" stroke-width="2"/>
<text x="497.0" y="705" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#fb7185">Stratification</text>
<text x="497.0" y="723" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Stratification d&#x27;individus à haut risque ;</text>
<text x="497.0" y="739" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">sous-typage (downstream).</text>
<line x1="665.0" y1="754" x2="665.0" y2="778" stroke="#fb7185" stroke-width="2" marker-end="url(#ah)"/>
<rect x="485.0" y="778" width="360" height="68" rx="10" fill="#ffe4e0" stroke="#fb7185" stroke-width="2"/>
<text x="497.0" y="797" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#fb7185">Prédiction</text>
<text x="497.0" y="815" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Modélisation prédictive comportementale à partir</text>
<text x="497.0" y="831" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">des déviations (downstream).</text>
<line x1="235.0" y1="706" x2="235.0" y2="874" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ah)"/>
<line x1="665.0" y1="846" x2="665.0" y2="874" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ah)"/>
<rect x="20" y="874" width="860" height="68" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6 4"/>
<text x="32" y="893" font-family="Segoe UI,Arial,sans-serif" font-size="13" font-weight="700" fill="#7c3aed">Application clinique (psychiatrie computationnelle)</text>
<text x="32" y="911" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Dépasser les comparaisons cas-témoins face à l&#x27;hétérogénéité des troubles mentaux.</text>
<text x="32" y="927" font-family="Segoe UI,Arial,sans-serif" font-size="12" fill="#1e293b">Stratification, sous-typage et prédiction comportementale au niveau individuel.</text></svg>