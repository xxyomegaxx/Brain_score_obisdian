<svg viewBox="0 0 900 1180" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <style>
      .t{font-size:12.5px;font-weight:700;fill:#0f172a}
      .d{font-size:10.5px;fill:#334155}
      .lbl{font-size:10px;fill:#475569;font-style:italic}
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="1180" fill="#ffffff"/>

  <!-- légende -->
  <g transform="translate(620,16)">
    <rect width="14" height="14" rx="3" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="20" y="11" class="lbl">teal = niveau du score</text>
    <rect y="22" width="14" height="14" rx="3" fill="#ffe4e0" stroke="#e26d5a"/>
    <text x="20" y="33" class="lbl">corail = finalité</text>
  </g>

  <!-- 1. Données d'entrée -->
  <g>
    <rect x="290" y="20" width="320" height="34" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="450" y="42" text-anchor="middle" class="t">Données d'entrée</text>
  </g>

  <!-- sous-cases features / covariables -->
  <g>
    <rect x="120" y="74" width="320" height="92" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="280" y="93" text-anchor="middle" class="t">Features (y)</text>
    <text x="135" y="113" class="d">FA (anisotropie fractionnelle) + CT (épaisseur corticale)</text>
    <text x="135" y="129" class="d">Niveau : 48 faisceaux (ICBM-DTI-81), 68 régions (Desikan)</text>
    <text x="135" y="145" class="d">1 valeur moyennée par faisceau / région et par sujet</text>
    <text x="135" y="161" class="d">116 loci au total</text>
  </g>
  <g>
    <rect x="460" y="74" width="320" height="92" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="620" y="93" text-anchor="middle" class="t">Covariables (x)</text>
    <text x="475" y="113" class="d">Âge, sexe, site d'acquisition (confond)</text>
    <text x="475" y="129" class="d">Niveau : sujet</text>
    <text x="475" y="145" class="d">Effets non-linéaires : terme âge² + interaction</text>
    <text x="475" y="161" class="d">sexe×âge (inclus si justifiés par le BIC)</text>
  </g>
  <line x1="450" y1="54" x2="280" y2="74" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="450" y1="54" x2="620" y2="74" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="280" y1="166" x2="445" y2="190" stroke="#64748b"/>
  <line x1="620" y1="166" x2="455" y2="190" stroke="#64748b"/>

  <!-- 2. Modélisation normative -->
  <g>
    <rect x="270" y="190" width="360" height="104" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="450" y="210" text-anchor="middle" class="t">Modélisation normative</text>
    <text x="285" y="230" class="d">Méthode : régression quantile (5e, 50e, 95e percentiles)</text>
    <text x="285" y="246" class="d">Granularité : un modèle par faisceau / région</text>
    <text x="285" y="262" class="d">IC par bootstrap (n = 1000)</text>
    <text x="285" y="278" class="d">Validation : 10-fold CV (175 entraîn. / 20 test, ×20) ; n = 195 sains</text>
  </g>
  <line x1="450" y1="166" x2="450" y2="190" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- 3. Scores déviants -->
  <g>
    <rect x="270" y="318" width="360" height="104" rx="8" fill="#fef3c7" stroke="#d97706"/>
    <text x="450" y="338" text-anchor="middle" class="t">Scores déviants</text>
    <text x="285" y="358" class="d">Z-score d'écart aux 5e / 95e percentiles</text>
    <text x="285" y="374" class="d">Encodage par locus : +1 supra / 0 normal / −1 infra</text>
    <text x="285" y="390" class="d">Direction : signé (infra vs supra distingués)</text>
    <text x="285" y="406" class="d">Seuils : infra z₅ &lt; −1,96 ; supra z₉₅ &gt; 1,96</text>
  </g>
  <line x1="450" y1="294" x2="450" y2="318" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- bifurcation vers branches -->
  <line x1="450" y1="422" x2="450" y2="446" stroke="#64748b"/>
  <line x1="230" y1="446" x2="670" y2="446" stroke="#64748b"/>
  <line x1="230" y1="446" x2="230" y2="470" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="670" y1="446" x2="670" y2="470" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- BRANCHE 1 : Par région (teal) -->
  <g>
    <rect x="55" y="470" width="350" height="78" rx="8" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="230" y="490" text-anchor="middle" class="t">Niveau — Par région</text>
    <text x="70" y="510" class="d">Carte de déviation par sujet : classe chacun des</text>
    <text x="70" y="526" class="d">116 loci en infra / normal / supra</text>
    <text x="70" y="542" class="d">% de patients déviants cartographié par locus (Fig. 2c–f)</text>
  </g>

  <!-- feuilles branche 1 -->
  <g>
    <rect x="55" y="566" width="350" height="58" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
    <text x="230" y="585" text-anchor="middle" class="t">Localisation</text>
    <text x="70" y="605" class="d">Infra-CT : cortex temporal + préfrontal ventromédian</text>
    <text x="70" y="619" class="d">≤ 17 % (faisceaux) / ≤ 18 % (régions) de patients par locus</text>
  </g>
  <g>
    <rect x="55" y="640" width="350" height="58" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
    <text x="230" y="659" text-anchor="middle" class="t">Détection d'atypies</text>
    <text x="70" y="679" class="d">Loci des écarts hautement hétérogènes entre sujets</text>
    <text x="70" y="693" class="d">Cartes individuelles ≠ carte moyenne de groupe</text>
  </g>
  <g>
    <rect x="55" y="714" width="350" height="58" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
    <text x="230" y="733" text-anchor="middle" class="t">Comparaison de groupes</text>
    <text x="70" y="753" class="d">≥ 1 écart infra-normal : 79 % patients vs 59 % sains</text>
    <text x="70" y="767" class="d">(p &lt; 0,001) ; supra : 46 % vs 61 %</text>
  </g>
  <line x1="230" y1="548" x2="230" y2="566" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="230" y1="624" x2="230" y2="640" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="230" y1="698" x2="230" y2="714" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- BRANCHE 2 : Global par sujet (teal) -->
  <g>
    <rect x="495" y="470" width="350" height="78" rx="8" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="670" y="490" text-anchor="middle" class="t">Niveau — Global par sujet</text>
    <text x="510" y="510" class="d">AAI (average abnormality index)</text>
    <text x="510" y="526" class="d">= moyenne de l'encodage +1/0/−1 sur les 116 loci</text>
    <text x="510" y="542" class="d">Résume l'ampleur globale de la déviation d'un sujet</text>
  </g>
  <!-- feuille branche 2 -->
  <g>
    <rect x="495" y="566" width="350" height="72" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
    <text x="670" y="585" text-anchor="middle" class="t">Association au phénotype</text>
    <text x="510" y="605" class="d">Risque polygénique × AAI-CT : r = −0,17 (p = 0,006)</text>
    <text x="510" y="621" class="d">QI courant × AAI-CT : r = 0,16 (p = 0,008)</text>
    <text x="510" y="637" class="d">CCA PRS↔déviations : r = 0,69 (p = 0,044)</text>
  </g>
  <line x1="670" y1="548" x2="670" y2="566" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- Application clinique (pointillés) -->
  <g>
    <rect x="200" y="1020" width="500" height="120" rx="10" fill="#f8fafc" stroke="#475569" stroke-dasharray="7 5"/>
    <text x="450" y="1044" text-anchor="middle" class="t">Application clinique</text>
    <text x="220" y="1066" class="d">Les cartes moyennes de groupe ne représentent pas le patient individuel</text>
    <text x="220" y="1084" class="d">→ modélisation normative pour démêler l'hétérogénéité de la schizophrénie</text>
    <text x="220" y="1102" class="d">Cibles personnalisées de neurostimulation, choix d'antipsychotiques</text>
    <text x="220" y="1120" class="d">Délimitation de sous-types putatifs (perspective)</text>
  </g>
  <line x1="230" y1="772" x2="380" y2="1020" stroke="#64748b" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <line x1="670" y1="638" x2="520" y2="1020" stroke="#64748b" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
</svg>
