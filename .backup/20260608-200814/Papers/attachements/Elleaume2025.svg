<svg viewBox="0 0 980 940" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <style>
      .t{font-size:12.5px;font-weight:700;fill:#0f172a}
      .d{font-size:10.5px;fill:#334155}
      .lbl{font-size:10px;fill:#475569;font-style:italic}
    </style>
  </defs>
  <rect x="0" y="0" width="980" height="940" fill="#ffffff"/>

  <g transform="translate(690,16)">
    <rect width="14" height="14" rx="3" fill="#ccfbf1" stroke="#0d9488"/>
    <text x="20" y="11" class="lbl">teal = niveau du score</text>
    <rect y="22" width="14" height="14" rx="3" fill="#ffe4e0" stroke="#e26d5a"/>
    <text x="20" y="33" class="lbl">corail = finalité</text>
  </g>

  <!-- 1. Donnees d'entree -->
  <rect x="330" y="20" width="320" height="34" rx="8" fill="#dbeafe" stroke="#2563eb"/>
  <text x="490" y="42" text-anchor="middle" class="t">Données d'entrée</text>

  <!-- features / covariables -->
  <rect x="70" y="74" width="380" height="92" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="260" y="93" text-anchor="middle" class="t">Features (y)</text>
  <text x="85" y="113" class="d">Épaisseur corticale + volumes sous-corticaux — 167 ROI</text>
  <text x="85" y="129" class="d">Niveau : par région</text>
  <text x="85" y="145" class="d">OASIS-3 (n=692 HC entraîn.) + AD ; réplication AIBL</text>

  <rect x="530" y="74" width="380" height="92" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="720" y="93" text-anchor="middle" class="t">Covariables (x)</text>
  <text x="545" y="113" class="d">Âge, sexe ; site (OASIS 1 / AIBL 2 / UKB 3)</text>
  <text x="545" y="129" class="d">Sous-échant. : âge représentatif / left / right-skewed</text>
  <text x="545" y="145" class="d">Sexe 1:1 → 1:10 ; tailles n = 5 → 692</text>

  <line x1="490" y1="54" x2="260" y2="74" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="490" y1="54" x2="720" y2="74" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="260" y1="166" x2="485" y2="188" stroke="#64748b"/>
  <line x1="720" y1="166" x2="495" y2="188" stroke="#64748b"/>

  <!-- 2. Modelisation normative -->
  <rect x="280" y="190" width="420" height="104" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="490" y="210" text-anchor="middle" class="t">Modélisation normative</text>
  <text x="295" y="230" class="d">Warped Bayesian Linear Regression (PCNtoolkit)</text>
  <text x="295" y="246" class="d">Entraînement direct vs transfert depuis UK Biobank (n=42 747)</text>
  <text x="295" y="262" class="d">10 tirages / taille ; test HC fixe (20%) + AD</text>
  <text x="295" y="278" class="d">Métriques : MSLL, SMSE, EV, Rho, ICC, couverture des queues</text>
  <line x1="490" y1="188" x2="490" y2="190" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- 3. Scores deviants -->
  <rect x="300" y="326" width="380" height="86" rx="8" fill="#fef3c7" stroke="#d97706"/>
  <text x="490" y="346" text-anchor="middle" class="t">Scores déviants</text>
  <text x="315" y="366" class="d">Z-score / centile prédit, par région et par sujet ; signé</text>
  <text x="315" y="382" class="d">Outlier : Z &lt; −1,96 ; tOC = nb de régions outliers / sujet</text>
  <text x="315" y="398" class="d">Erreurs z (MSE / MBE) vs modèle plein</text>
  <line x1="490" y1="294" x2="490" y2="326" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- arborescence : 2 racines teal -->
  <rect x="120" y="452" width="320" height="60" rx="8" fill="#ccfbf1" stroke="#0d9488"/>
  <text x="280" y="472" text-anchor="middle" class="t">Par région</text>
  <text x="135" y="492" class="d">Cartes de déviation régionales (167 ROI)</text>

  <rect x="540" y="452" width="320" height="60" rx="8" fill="#ccfbf1" stroke="#0d9488"/>
  <text x="700" y="472" text-anchor="middle" class="t">Global par sujet</text>
  <text x="555" y="492" class="d">tOC = total outlier count / sujet (AD≈14 vs HC≈4)</text>

  <line x1="430" y1="412" x2="280" y2="452" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="550" y1="412" x2="700" y2="452" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- feuilles corail gauche -->
  <rect x="120" y="540" width="320" height="52" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
  <text x="280" y="560" text-anchor="middle" class="t">Localisation</text>
  <text x="135" y="579" class="d">Régions atrophiées AD : hippocampe 30,5%, amygdale 28,1%</text>

  <rect x="120" y="612" width="320" height="52" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
  <text x="280" y="632" text-anchor="middle" class="t">Détection d'atypies</text>
  <text x="135" y="651" class="d">Cartes d'outliers par ROI (Z &lt; −1,96)</text>

  <line x1="280" y1="512" x2="280" y2="540" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="280" y1="592" x2="280" y2="612" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- feuilles corail droite -->
  <rect x="540" y="540" width="320" height="52" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
  <text x="700" y="560" text-anchor="middle" class="t">Comparaison de groupes</text>
  <text x="555" y="579" class="d">AD vs HC sur déviations et tOC</text>

  <rect x="540" y="612" width="320" height="52" rx="8" fill="#ffe4e0" stroke="#e26d5a"/>
  <text x="700" y="632" text-anchor="middle" class="t">Prédiction</text>
  <text x="555" y="651" class="d">SVC sur z-scores : AUC≈0,86 (robuste dès ~15 sujets)</text>

  <line x1="700" y1="512" x2="700" y2="540" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="700" y1="592" x2="700" y2="612" stroke="#64748b" marker-end="url(#arrow)"/>

  <!-- application clinique (pointilles) -->
  <rect x="300" y="760" width="380" height="80" rx="8" fill="#ffffff" stroke="#475569" stroke-dasharray="6 4"/>
  <text x="490" y="782" text-anchor="middle" class="t">Application clinique</text>
  <text x="315" y="802" class="d">Alzheimer / vieillissement — aide à la décision neuroradiologique</text>
  <text x="315" y="818" class="d">Régions cohérentes : hippocampe, amygdale, cortex entorhinal</text>

  <line x1="280" y1="664" x2="430" y2="760" stroke="#64748b" marker-end="url(#arrow)"/>
  <line x1="700" y1="664" x2="550" y2="760" stroke="#64748b" marker-end="url(#arrow)"/>
</svg>
